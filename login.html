<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Repórter da Periferia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        .login-container { max-width: 420px; width: 90%; margin: 0 auto; }
        .login-card {
            background: rgba(26,26,46,0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid rgba(232,93,4,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .login-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #e85d04, #f48c06);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 20px;
        }
        .login-card h2 { margin-bottom: 8px; font-size: 1.5rem; }
        .login-card p { color: #a0a0a0; margin-bottom: 32px; font-size: 0.85rem; }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: #1e1e2e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
        }
        .login-card input:focus { outline: none; border-color: #e85d04; }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e85d04, #f48c06);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .login-card button:hover { transform: translateY(-2px); }
        .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #4a4a5a; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #2a2a3a; }
        .guest-btn { background: transparent !important; border: 1px solid #e85d04 !important; color: #e85d04 !important; }
        .guest-btn:hover { background: rgba(232,93,4,0.1) !important; }
        .login-footer { margin-top: 24px; color: #6a6a7a; font-size: 0.8rem; }
        .login-footer a { color: #e85d04; text-decoration: none; }
        .error-msg { background: rgba(239,68,68,0.2); color: #ef4444; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
        .site-name { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; color: #e85d04; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="site-name">REPÓRTER DA PERIFERIA</div>
            <div class="login-logo">📰</div>
            <h2>Bem-vindo</h2>
            <p>"A notícia que não chega no centro"</p>
            <div id="errorMsg" class="error-msg"></div>
            <input type="text" id="loginUsername" placeholder="Usuário">
            <input type="password" id="loginPassword" placeholder="Senha">
            <button id="doLoginBtn">Entrar</button>
            <div class="divider">ou</div>
            <button id="guestBtn" class="guest-btn">Entrar como Convidado</button>
            <div class="login-footer">Não tem conta? <a href="register.html">Registre-se</a></div>
        </div>
    </div>
    <script src="database.js"></script>
    <script>
        document.getElementById('doLoginBtn').onclick = () => {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const users = DB.getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            if (user) { DB.setCurrentUser(user); window.location.href = 'index.html'; }
            else { document.getElementById('errorMsg').style.display = 'block'; document.getElementById('errorMsg').textContent = 'Usuário ou senha inválidos'; }
        };
        document.getElementById('guestBtn').onclick = () => {
            const guestUser = DB.getUsers().find(u => u.username === 'convidado');
            if (guestUser) { DB.setCurrentUser(guestUser); window.location.href = 'index.html'; }
        };
    </script>
</body>
</html>
