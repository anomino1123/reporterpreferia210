<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar | Repórter da Periferia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        .register-container { max-width: 420px; width: 90%; margin: 0 auto; }
        .register-card {
            background: rgba(26,26,46,0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            border: 1px solid rgba(232,93,4,0.3);
        }
        .register-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #e85d04, #f48c06);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 20px;
        }
        .register-card h2 { margin-bottom: 8px; }
        .register-card p { color: #a0a0a0; margin-bottom: 32px; }
        .register-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            background: #1e1e2e;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            color: white;
        }
        .register-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e85d04, #f48c06);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        .register-footer { margin-top: 24px; color: #6a6a7a; }
        .register-footer a { color: #e85d04; text-decoration: none; }
        .error-msg { background: rgba(239,68,68,0.2); color: #ef4444; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-logo">📰</div>
            <h2>Criar conta</h2>
            <p>Junte-se à comunidade</p>
            <div id="errorMsg" class="error-msg"></div>
            <input type="text" id="regUsername" placeholder="Usuário">
            <input type="text" id="regName" placeholder="Seu nome">
            <input type="password" id="regPassword" placeholder="Senha (mínimo 3 caracteres)">
            <button id="doRegisterBtn">Criar conta</button>
            <div class="register-footer">Já tem conta? <a href="login.html">Faça login</a></div>
        </div>
    </div>
    <script src="database.js"></script>
    <script>
        document.getElementById('doRegisterBtn').onclick = () => {
            const username = document.getElementById('regUsername').value.trim();
            const name = document.getElementById('regName').value.trim() || username;
            const password = document.getElementById('regPassword').value;
            if (!username || !password) { showError('Preencha todos os campos'); return; }
            if (password.length < 3) { showError('Senha deve ter pelo menos 3 caracteres'); return; }
            const users = DB.getUsers();
            if (users.find(u => u.username === username)) { showError('Usuário já existe'); return; }
            const newUser = { id: Date.now(), username, password, name, bio: "Novo por aqui!", avatar: null, emoji: "📝", isVerified: false, followers: [], following: [], role: "user", createdAt: new Date().toISOString() };
            users.push(newUser);
            DB.saveUsers(users);
            DB.setCurrentUser(newUser);
            window.location.href = 'index.html';
        };
        function showError(msg) { const err = document.getElementById('errorMsg'); err.textContent = msg; err.style.display = 'block'; setTimeout(() => err.style.display = 'none', 3000); }
    </script>
</body>
</html>
