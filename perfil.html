<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Repórter da Periferia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0a0a0a; min-height: 100vh; }
        .profile-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .profile-card { background: #1a1a2e; border-radius: 32px; padding: 40px; border: 1px solid rgba(232,93,4,0.3); }
        .profile-header { text-align: center; margin-bottom: 32px; }
        .profile-avatar-large {
            width: 120px; height: 120px; background: linear-gradient(135deg, #e85d04, #f48c06);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin: 0 auto 20px; cursor: pointer; overflow: hidden;
        }
        .profile-avatar-large:hover { transform: scale(1.05); }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .verified-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(59,130,246,0.2); padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; color: #3b82f6; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #a0a0a0; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 16px; color: white; font-family: inherit; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .save-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #e85d04, #f48c06); border: none; border-radius: 40px; color: white; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #e85d04; text-decoration: none; }
        #avatarUpload { display: none; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 10px; }
        .emoji-option { background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; font-size: 1.3rem; }
        .emoji-option:hover { background: #e85d04; transform: scale(1.05); }
        .emoji-option.selected { background: #e85d04; border-color: #e85d04; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="avatarLargeBtn">
                    <span id="avatarLargeEmoji">🧠</span>
                    <img id="avatarLargeImage" style="display: none;">
                </div>
                <h2 id="displayName">Carregando...</h2>
                <div id="verifiedContainer" style="display: none;" class="verified-badge"><i class="fas fa-check-circle"></i> Verificado</div>
                <p id="displayUsername" style="color: #a0a0a0; margin-top: 5px;"></p>
            </div>
            <input type="file" id="avatarUpload" accept="image/*">
            <div class="form-group"><label><i class="fas fa-user"></i> Seu nome</label><input type="text" id="profileName"></div>
            <div class="form-group"><label><i class="fas fa-feather-alt"></i> Biografia</label><textarea id="profileBio"></textarea></div>
            <div class="form-group"><label><i class="fas fa-smile"></i> Emoji principal</label><div class="emoji-grid" id="emojiGrid">
                <div class="emoji-option" data-emoji="🧠">🧠</div><div class="emoji-option" data-emoji="💭">💭</div>
                <div class="emoji-option" data-emoji="📚">📚</div><div class="emoji-option" data-emoji="🎙️">🎙️</div>
                <div class="emoji-option" data-emoji="⚡">⚡</div><div class="emoji-option" data-emoji="🎭">🎭</div>
                <div class="emoji-option" data-emoji="🔥">🔥</div><div class="emoji-option" data-emoji="💡">💡</div>
                <div class="emoji-option" data-emoji="📝">📝</div><div class="emoji-option" data-emoji="🌟">🌟</div>
                <div class="emoji-option" data-emoji="🎯">🎯</div><div class="emoji-option" data-emoji="💪">💪</div>
            </div></div>
            <button class="save-btn" id="saveProfileBtn"><i class="fas fa-save"></i> Salvar</button>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar</a>
        </div>
    </div>
    <script src="database.js"></script>
    <script>
        let currentUser = DB.getCurrentUser();
        if (!currentUser) window.location.href = 'login.html';
        let selectedEmoji = currentUser.emoji || '🧠';
        document.getElementById('profileName').value = currentUser.name || '';
        document.getElementById('profileBio').value = currentUser.bio || '';
        document.getElementById('displayName').textContent = currentUser.name;
        document.getElementById('displayUsername').textContent = '@' + currentUser.username;
        if (currentUser.isVerified || currentUser.username === 'adminniriswest') document.getElementById('verifiedContainer').style.display = 'inline-flex';
        if (currentUser.avatar) {
            document.getElementById('avatarLargeImage').src = currentUser.avatar;
            document.getElementById('avatarLargeImage').style.display = 'block';
            document.getElementById('avatarLargeEmoji').style.display = 'none';
        } else { document.getElementById('avatarLargeEmoji').textContent = currentUser.emoji || '🧠'; }
        document.querySelectorAll('.emoji-option').forEach(opt => {
            if (opt.dataset.emoji === selectedEmoji) opt.classList.add('selected');
            opt.onclick = () => { document.querySelectorAll('.emoji-option').forEach(o => o.classList.remove('selected')); opt.classList.add('selected'); selectedEmoji = opt.dataset.emoji; };
        });
        document.getElementById('avatarLargeBtn').onclick = () => document.getElementById('avatarUpload').click();
        document.getElementById('avatarUpload').onchange = (e) => {
            const file = e.target.files[0];
            if (file) { const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('avatarLargeImage').src = ev.target.result; document.getElementById('avatarLargeImage').style.display = 'block'; document.getElementById('avatarLargeEmoji').style.display = 'none'; }; reader.readAsDataURL(file); }
        };
        document.getElementById('saveProfileBtn').onclick = () => {
            const newName = document.getElementById('profileName').value;
            const newBio = document.getElementById('profileBio').value;
            const avatarImg = document.getElementById('avatarLargeImage');
            const newAvatar = avatarImg.style.display === 'block' ? avatarImg.src : null;
            const users = DB.getUsers();
            const idx = users.findIndex(u => u.id === currentUser.id);
            if (idx !== -1) {
                users[idx].name = newName; users[idx].bio = newBio; users[idx].emoji = selectedEmoji;
                if (newAvatar) users[idx].avatar = newAvatar;
                DB.saveUsers(users);
                DB.setCurrentUser(users[idx]);
                alert('Perfil atualizado!');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
